<section id="contact" class="py-5">
    <div class="container">
        <h2 class="mb-3">Contact</h2>
        <p class="mb-4">
            Donec ullamcorper nulla non metus auctor fringilla. Vestibulum id ligula porta felis euismod semper. Praesent commodo cursus magna, vel scelerisque nisl consectetur. Fusce dapibus, tellus ac cursus commodo.
        </p>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="bg-light p-4 rounded">
                    <form>
                        <div class="row mb-3">
                            <label for="email" class="col-sm-3 col-form-label fw-bold text-end">Your E-mail</label>
                            <div class="col-sm-9">
                                <input type="email" class="form-control" id="email" placeholder="Your email">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="message" class="col-sm-3 col-form-label fw-bold text-end">Your message</label>
                            <div class="col-sm-9">
                                <textarea class="form-control" id="message" rows="4" placeholder="Please enter your message here..."></textarea>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-9 offset-sm-3 text-end">
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
